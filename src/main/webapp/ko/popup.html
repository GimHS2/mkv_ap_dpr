<html>
<head>
<meta http-equiv='Content-Type' content='text/html; charset=utf-8'/>
<base href="ko/">
	<style>
		.layerPopup {
			z-index: 10000;
			position: fixed;
			left: 50%;
			top: 50%;
			transform: translate(-50%, -50%);
			background-color: #FFFFFF;
			word-break:break-all;
			width: 900px;
			height: 480px;
			padding: 30px;
			box-shadow: 0px 0px 30px rgba(0, 0, 0, 0.6), 0px 0px 10px rgba(0, 0, 0, 0.3);
		}

		.layerBox {
			position: absolute;
			width: 100%;
			top: 50%;
			left: 52%;
			transform: translate(-50%, -50%);
		}

		.layerBox p {
			font-size: 17px;
		}

		.layerPopup a{
			text-decoration: underline;
			color: #0000EE;
			width: 50px;
			height: 40px;
		}

		.notice_main {
			margin-top: 80px;
			margin-bottom: 80px;
		}

		.underline {
			text-decoration: underline;
			text-decoration-color: #000000;
		}

		.close-btn {
			position: absolute;
			top: 10px;
			right: 10px;
			cursor: pointer;
			font-size: 20px;
		}
		.popup-logo {
			position: absolute;
			top: 20px;
			left: 20px;
		}
	</style>

	<script type='text/javascript' src='script/jquery.min.js'></script>
	<script type="text/javascript">
		$( document ).ready(function() {
			var count = 15;
			$( "span#countdown" ).text( count );

			var countdown = setInterval(function() {
				$( "span#countdown" ).text( count );
				if (count == 0) {
					clearInterval(countdown);
					parent.location.href = 'https://qa.apackenvuedportal.com';
				}
					count--;
			}, 1000);
		});

		function closePop() {
			parent.location.href = 'https://qa.apackenvuedportal.com';
		}

		function redirectLink() {
			parent.location.href = 'https://qa.apackenvuedportal.com';
		}
	</script>
</head>
<body>
	<div class="layerPopup" id="layer_popup">
		<div class ='popup-logo'>
			<img src='images/popup-logo.png'>
		</div>
		<div class='layerBox'>
			<p><span id="countdown"></span> 초 후에, 새로운 KENVUE D-Portal 사이트로 이동하게 됩니다.</p>
			<div class ='notice_main'>
			<p>사용자분들께,</p>
			<p>Kenvue Distributor Portal 이 새로운 주소로 2024년 5월 8일부터 변경됩니다. <a id="portalLink" onclick="redirectLink()" style="cursor: pointer;">qa.apackenvuedportal.com</a><span class="underline"></span></p>
			<p>현재의 URL주소는 2024년 12월 31일 부로 변경이 됩니다. 위의 새로운 주소로 반드시 사용해 주시길 부탁 드립니다.</p>
			</div>
			<p>보다 자세한 정보를 원하실경우, 본 메일계정으로 문의 바랍니다: <a href="mailto:﻿DL-KENVUE-DELIVER-CS-TEAM@kenvue.com">DL-KENVUE-DELIVER-CS-TEAM@kenvue.com</a></p>
		</div>
		<div class="close-btn" onclick="closePop()">
			<img src='images/popup-close.png'>
		</div>
	</div>
</body>
</html>
