<html>
<head>
	<meta http-equiv='Content-Type' content='text/html; charset=euc-kr'>
	<title>Loading</title>
	<style type='text/css'>
		body#loading_page {
			margin: 0px;
			background-color: #F1F1F1;
			height: 100%;
		}

		div.loading {
			text-align: center;
			width: 290px; height: 90px;
			position: absolute;
			top: 50%; left: 50%;
			margin: -45px 0px 0px -145px;
		}
	</style>

	<script type='text/javascript' src='script/utils.js'></script>
	<script type='text/javascript'>
		function bodyLoad() {
			var url = decodeURIComponent( getQueryValue(location.href, "url") );
			if( url )
				window.open( url, "_self" );
		}
	</script>
</head>

<body id='loading_page' onLoad="JavaScript:bodyLoad();">
	<div class='loading' pos='90'><img src='images/loading.gif'></div>
</body>
</html>
