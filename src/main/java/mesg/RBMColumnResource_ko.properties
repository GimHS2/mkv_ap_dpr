########################################################################################################################
#	RBMUploadLog
########################################################################################################################
RBMUploadLog:
	%primaryKeys( logId )
	uploadTypeName				\uC885\uB958					Y	width='100'						${RBM_UPLOADLOG_@uploadType}
	uploadTypeName%HELP			$H{uploadTypeName}
	userName					\uC0AC\uC6A9\uC790				Y	class='username'				$H{userName~16b}
	startDateTime				\uC2E4\uD589\uC2DC\uC791\uC77C\uC2DC			Y	class='date_ymdhi'				${startDateTime~~16}
	startDateTime.ymd			\uC2E4\uD589\uC77C				Y	class='date'					${startDateTime~~10}
	startDateTime.hi			\uC2E4\uD589\uC2DC\uC791\uC2DC\uAC01			Y	class='date_md'					${startDateTime~11~16}
	endDateTime					\uC2E4\uD589\uC885\uB8CC\uC77C\uC2DC			Y	class='date_ymdhi'				${endDateTime~~16}
	endDateTime.hi				\uC2E4\uD589\uC885\uB8CC\uC2DC\uAC01			Y	class='date_md'					${endDateTime~11~16}
	lineCount					\uC804\uCCB4\uAC74\uC218				Y	class='count_s'					${lineCount#NF.INTEGER}
	successCount				\uC131\uACF5\uAC74\uC218				Y	class='count_s'					${successCount#NF.INTEGER}
	warningCount				\uACBD\uACE0\uAC74\uC218				Y	class='count_s'					${warningCount#NF.INTEGER}
	errorCount					\uC5D0\uB7EC\uAC74\uC218				Y	class='count_s'					${errorCount#NF.INTEGER}
	message						\uBA54\uC2DC\uC9C0				Y	class='description'				%{MSG_UPLOADLOG_RESULT,${lineCount},${successCount},${errorCount}}
	status						\uC0C1\uD0DC					Y	class='status_3'				${RBM_UPLOADLOG_STATUS_@status}
	LNK.menu					JavaScript:linkMenuReq("${logId}");						\uD31D\uC5C5\uBA54\uB274

	GRP.count					\uAC74\uC218
	GRP.count%COL				lineCount				\uC804\uCCB4
	GRP.count%COL				successCount			\uC131\uACF5
	GRP.count%COL				warningCount			\uACBD\uACE0
	GRP.count%COL				errorCount				\uC5D0\uB7EC

RBMUploadLog%LIST:
	%defaultSortKeys( startDateTime#DESC )
	uploadTypeName, message#menu, lineCount, successCount, warningCount, errorCount, startDateTime, userName, status


